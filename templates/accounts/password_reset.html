{% extends 'base/layout.html' %}

{% block auth_content %}

<div class="container mt-5">

    <div class="card p-4 shadow">

        <h2>Forgot Password</h2>

        <p>Enter your registered email address.</p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-primary">
                Send Reset Link
            </button>

        </form>

    </div>

</div>

{% endblock %}
