{% extends "base/layout.html" %}

{% block title %}Edit Class - SMS{% endblock %}
{% block page_title %}Edit Class{% endblock %}

{% block content %}
<div class="container">
    <h3>Edit Class</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">Standard</label>
            <input type="text" name="standard" class="form-control" value="{{ class.standard }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" value="{{ class.name }}" required>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'classes:list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
