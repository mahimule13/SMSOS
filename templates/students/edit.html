{% extends "base/layout.html" %}

{% block title %}Edit Student - SMS{% endblock %}
{% block page_title %}Edit Student{% endblock %}

{% block content %}
<div class="container">
    <h3>Edit Student</h3>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">First name</label>
                <input type="text" name="first_name" class="form-control" value="{{ student.user.first_name }}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Last name</label>
                <input type="text" name="last_name" class="form-control" value="{{ student.user.last_name }}" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ student.phone }}" required>
            </div>
        </div>

        <div class="row">
            <div class="col-md-12 mb-3">
                <label class="form-label">Address</label>
                <textarea name="address" class="form-control" rows="2">{{ student.address }}</textarea>
            </div>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Father Name</label>
                <input type="text" name="father_name" class="form-control" value="{{ student.father_name }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Mother Name</label>
                <input type="text" name="mother_name" class="form-control" value="{{ student.mother_name }}" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'students:list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
