{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h4>Assignment Submission</h4>

</div>

<div class="card-body">

<p><strong>Student :</strong>

{{ submission.student.user.get_full_name }}

</p>

<p><strong>Assignment :</strong>

{{ submission.assignment.title }}

</p>

<p>

<strong>Submitted :</strong>

{{ submission.submitted_at }}

</p>

<p>

<strong>File :</strong>

<a href="{{ submission.submission_file.url }}">

Download

</a>

</p>

<hr>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>

Teacher Remarks

</label>

<textarea

name="remarks"

class="form-control"

rows="4">{{ submission.remarks }}</textarea>

</div>

<div class="mb-3">

<label>

Marks Obtained

</label>

<input

type="number"

step="0.01"

name="marks"

class="form-control"

value="{{ submission.marks_obtained }}">

</div>

<div class="form-check mb-3">

<input

class="form-check-input"

type="checkbox"

name="checked"

{% if submission.is_checked %}checked{% endif %}>

<label>

Submission Checked

</label>

</div>

<button

class="btn btn-success">

Save

</button>

</form>

</div>

</div>

</div>

{% endblock %}
