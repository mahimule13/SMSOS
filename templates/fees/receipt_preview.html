<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Preview</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                <h4 class="mb-0 text-primary">Receipt Preview</h4>
                
                <a href="{% url 'fees:download_receipt' receipt_file %}" class="btn btn-success d-inline-flex align-items-center">
                    Download PDF
                </a>
            </div>
            
            <div class="card-body p-0">
                <iframe src="{% url 'fees:receipt_preview' receipt_file %}" width="100%" height="650px" style="border: none;">
                    <p>Your browser does not support iframes.</p>
                </iframe>
            </div>
        </div>
    </div>

</body>
</html>
